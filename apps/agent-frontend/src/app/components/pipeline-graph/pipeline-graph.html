<div class="graph-container glass-panel">
  <div class="graph-header">
    <h3 class="label">Pipeline Flow</h3>
    <p class="graph-caption">Question → evidence → deliberation → verdict</p>
  </div>

  <div class="pipeline-map">
    <div class="flow-row">
      <div class="flow-node" [ngClass]="getNodeClass('question')">Question</div>
      <div
        class="flow-arrow"
        [ngClass]="getConnectorClass('question', 'research')"
      >
        →
      </div>
      <div class="flow-node" [ngClass]="getNodeClass('research')">Research</div>
      <div
        class="flow-arrow"
        [ngClass]="getConnectorClass('research', 'packet')"
      >
        →
      </div>
      <div class="flow-node" [ngClass]="getNodeClass('packet')">Packet</div>
    </div>

    <div class="branch-block">
      <div class="branch-label">Specialist panel</div>
      <div class="agent-row">
        <div class="flow-node agent" [ngClass]="getNodeClass('pragmatist')">
          Pragmatist
        </div>
        <div class="flow-node agent" [ngClass]="getNodeClass('performance')">
          Performance
        </div>
        <div class="flow-node agent" [ngClass]="getNodeClass('dx')">
          DX Advocate
        </div>
        <div class="flow-node agent" [ngClass]="getNodeClass('skeptic')">
          Skeptic
        </div>
      </div>
    </div>

    <div class="flow-row verdict-row">
      <div class="flow-node" [ngClass]="getNodeClass('judge')">Judge</div>
      <div
        class="flow-arrow"
        [ngClass]="getConnectorClass('judge', 'rebuttal')"
      >
        →
      </div>
      <div class="flow-node" [ngClass]="getNodeClass('rebuttal')">Rebuttal</div>
      <div
        class="flow-arrow"
        [ngClass]="getConnectorClass('rebuttal', 'verdict')"
      >
        →
      </div>
      <div class="flow-node" [ngClass]="getNodeClass('verdict')">Verdict</div>
    </div>
  </div>
</div>
