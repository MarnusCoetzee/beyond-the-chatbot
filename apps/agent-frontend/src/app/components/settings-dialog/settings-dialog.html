<button
  type="button"
  class="overlay"
  aria-label="Close settings"
  (click)="closed.emit()"
></button>
<div class="dialog glass-panel">
  <div class="dialog-header">
    <h2>Settings</h2>
    <button class="close-btn" type="button" (click)="closed.emit()">✕</button>
  </div>

  <div class="dialog-body">
    <section class="section">
      <h3 class="label">LLM Provider</h3>
      <div class="field">
        <label class="field-label" for="base-url">Base URL</label>
        <input
          id="base-url"
          type="text"
          [(ngModel)]="baseUrl"
          placeholder="https://integrate.api.nvidia.com/v1"
        />
      </div>
      <div class="field">
        <label class="field-label" for="api-key">API Key</label>
        <input
          id="api-key"
          type="password"
          [(ngModel)]="apiKey"
          placeholder="Your API key"
        />
      </div>
      <div class="field">
        <label class="field-label" for="model">Model</label>
        <input
          id="model"
          type="text"
          [(ngModel)]="model"
          placeholder="meta/llama-3.1-8b-instruct"
        />
      </div>
    </section>

    <section class="section">
      <h3 class="label">Web Search (Optional)</h3>
      <div class="field toggle-field">
        <label for="search-enabled">
          <input
            id="search-enabled"
            type="checkbox"
            [(ngModel)]="searchEnabled"
          />
          Enable web search for research
        </label>
      </div>
      @if (searchEnabled) {
      <div class="field">
        <label class="field-label" for="search-provider">Provider</label>
        <select id="search-provider" [(ngModel)]="searchProvider">
          <option value="brave">Brave Search</option>
          <option value="firecrawl">Firecrawl</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label" for="search-api-key">Search API Key</label>
        <input
          id="search-api-key"
          type="password"
          [(ngModel)]="searchApiKey"
          placeholder="Search provider API key"
        />
      </div>
      }
    </section>
  </div>

  <div class="dialog-footer">
    <button class="save-btn" (click)="save()">Save</button>
  </div>
</div>
