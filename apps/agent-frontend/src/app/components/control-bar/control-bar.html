<header class="control-bar glass-panel">
  <div class="bar-left">
    <button type="button" class="brand" (click)="newSession()">
      Consensus Lab
    </button>
    <span class="status-chip" [class]="statusClass">{{ statusLabel }}</span>
  </div>
  <div class="bar-right">
    <button class="icon-btn" (click)="toggleHistory()" title="History">
      ☰
    </button>
    <button class="icon-btn" (click)="toggleSettings()" title="Settings">
      ⚙
    </button>
  </div>
</header>

@if (showSettings) {
<app-settings-dialog (closed)="showSettings = false" />
} @if (showHistory) {
<app-session-history (closed)="showHistory = false" />
}
