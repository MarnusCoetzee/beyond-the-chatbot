name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      NX_TASKS_RUNNER_DYNAMIC_OUTPUT: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Check formatting
        run: npx nx format:check --all

      - name: Lint, test, build, and typecheck
        run: npx nx run-many -t lint test build typecheck --parallel=1

      - name: Backend e2e
        env:
          PORT: 3100
        run: npx nx e2e agent-backend-e2e --skipNxCache

      - name: Frontend e2e
        run: npx nx e2e agent-frontend-e2e --skipNxCache -- --project=chromium
